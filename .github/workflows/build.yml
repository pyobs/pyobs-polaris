name: build

on:
  push:
  pull_request:

jobs:
  build:
    # Windows/macOS added for build+test coverage only (DEVELOPMENT.md's
    # "Windows/macOS are untested, not unsupported" note on QtKeychain -
    # none of SavedAccountsModel's code is Linux-specific, it's just never
    # been run there). Deliberately NOT wired into the release/packaging
    # story below - that stays Linux-only until someone actually designs
    # cross-platform release artifacts (the "never bundle Qt" policy that
    # works fine on Linux via apt doesn't translate cleanly to a platform
    # with no equivalent system Qt).
    #
    # UNVERIFIED against a real Windows/macOS GitHub-hosted runner as of
    # introduction - unlike the rest of this project's "verified live"
    # bar, there was no way to test this locally. Expect the Qt `arch`
    # string and module defaults below to need a follow-up fix once a real
    # run's log is available.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-26.04, windows-latest, macos-latest]
    # contents: write is only actually exercised on a tag push (the release
    # step below is gated on that) - harmless for ordinary branch/PR runs,
    # which never reach that step.
    permissions:
      contents: write
    # ubuntu-26.04 matches the dev machine's OS exactly, rather than
    # GitHub's "ubuntu-latest" label, which lags real Ubuntu releases by
    # years (currently Ubuntu 24.04 / Qt 6.4.2 - over two years behind what
    # this project requires: qt_standard_project_setup(REQUIRES 6.5) in
    # CMakeLists.txt, and what's actually used in dev, 6.10.2). That gap
    # already caused two build breaks (QDomDocument::ParseOption needs 6.8,
    # QQmlApplicationEngine::loadFromModule needs 6.5). If ubuntu-26.04 ever
    # stops being offered as a hosted runner, fall back to pinning a modern
    # Qt6 explicitly (e.g. via jurplel/install-qt-action, already used
    # below for Windows/macOS) rather than silently drifting back onto
    # ubuntu-latest's much older apt Qt. windows-latest/macos-latest are
    # left floating (no equivalent apt-version-lag risk on those images).
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Ninja+MSVC needs the MSVC dev environment (cl.exe, INCLUDE/LIB env
      # vars) active in the shell *before* CMake configures - unlike the
      # Visual Studio generator, Ninja doesn't locate MSVC itself. Must run
      # before every later step on Windows, hence right after checkout.
      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt6 dev packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-base-dev-tools \
            qt6-declarative-dev qt6-declarative-dev-tools

      # libsecret-1-dev + pkg-config: required by QtKeychain (vendored via
      # FetchContent below) to build its Linux Secret Service backend -
      # see its own CMakeLists.txt's pkg_check_modules(LIBSECRET REQUIRED
      # libsecret-1). QtKeychain's Windows (Credential Manager) and macOS
      # (Keychain) backends link platform frameworks its own CMakeLists.txt
      # already handles - no equivalent extra step needed on those OSes.
      - name: Install QtKeychain build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libsecret-1-dev pkg-config

      # Neither Windows nor macOS has an OS-provided Qt6 the way Ubuntu's
      # apt does - install-qt-action fetches a prebuilt desktop Qt from
      # Qt's own aqt archives instead. Version picked close to the Linux
      # leg's apt-provided 6.10.2 (subject to what aqt actually mirrors);
      # `arch` is required for Windows specifically (Linux/macOS desktop
      # default to gcc_64/clang_64 automatically).
      - name: Install Qt6 (Windows/macOS)
        if: runner.os != 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          arch: ${{ runner.os == 'Windows' && 'win64_msvc2019_64' || '' }}

      # Forces Ninja (a single-config generator) instead of each OS's
      # default - critically, Visual Studio's generator on Windows, which
      # would make Conan's CMakeToolchain emit a differently-named preset
      # ("conan-default" instead of "conan-release"), breaking the
      # `--preset conan-release` commands shared by every OS below. Not
      # preinstalled on any of these runner images (GitHub dropped the
      # incidental Windows inclusion a while back, and it was never on
      # Ubuntu/macOS images) - installed via pip since that's the one
      # install method that doesn't need a third OS-specific step.
      - name: Install Ninja (Windows/macOS)
        if: runner.os != 'Linux'
        run: pip install ninja

      - name: Install Conan
        run: pipx install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      # Conan's package cache: mostly future-proofing until a real Conan
      # dependency (e.g. cfitsio) shows up - conanfile.txt has no requires
      # yet, see conanfile.txt for why (qxmpp is deliberately not one).
      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.txt') }}

      # qxmpp and QtKeychain are both vendored via CMake FetchContent (see
      # cmake/Dependencies.cmake), which means compiling ~100 of qxmpp's
      # source files (plus QtKeychain's) from scratch on every CI run
      # otherwise - by far the most expensive part of this build. Keyed on
      # cmake/Dependencies.cmake specifically (which pins both GIT_TAGs),
      # not the whole CMakeLists.txt - that used to bust this cache on
      # every unrelated CMakeLists.txt edit (a new widget/source file added
      # to qt_add_executable()/qt_add_qml_module()'s lists, which is nearly
      # every commit), silently costing a full rebuild-from-scratch each
      # time. A real GIT_TAG bump still invalidates it correctly since that
      # only lives in cmake/Dependencies.cmake now.
      - name: Cache FetchContent-vendored dependency builds
        uses: actions/cache@v4
        with:
          path: build/Release/_deps
          key: fetchcontent-deps-${{ runner.os }}-${{ hashFiles('cmake/Dependencies.cmake') }}

      - name: Conan install
        run: >
          conan install . --build=missing
          ${{ runner.os != 'Linux' && '-c tools.cmake.cmaketoolchain:generator=Ninja' || '' }}

      - name: Configure
        run: >
          cmake --preset conan-release
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build --preset conan-release

      # tst_savedaccountsmodel exercises the real OS keychain rather than
      # mocking QtKeychain (see DEVELOPMENT.md) - a bare runner has no
      # D-Bus session/keyring daemon at all, so its two keychain-storing
      # tests skip themselves under CI specifically (see
      # tst_savedaccountsmodel.cpp's realKeychainBackendAvailable() - `CI`
      # is the env var GitHub Actions sets for this). Getting a real
      # Secret Service running headlessly turned out to be genuinely
      # fragile (gnome-keyring's interactive collection-creation prompt
      # failed a different way in each of several attempts - see this
      # file's own git history) - on the user's direct call, this is
      # dev-machine-only coverage for those two tests rather than chasing
      # a mock D-Bus Secret Service just for CI.
      - name: Test
        run: ctest --output-on-failure
        working-directory: build/Release

      # Only on a version tag push. The plain build/Release/polaris
      # binary is not redistributable as-is: it links libQXmppQt6.so.5 and
      # libqt6keychain.so.1 via an absolute RUNPATH into this job's own
      # ephemeral build directory (CMake's normal, correct behavior for an
      # uninstalled build-tree binary) - copying just the executable
      # elsewhere would fail with "cannot open shared object file" the
      # moment it's run. patchelf rewrites the RUNPATH to $ORIGIN so a copy
      # of both .so's placed alongside the binary (as this tarball does) is
      # found instead, wherever it's eventually extracted.
      - name: Package release artifact
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Linux'
        run: |
          sudo apt-get install -y patchelf
          mkdir -p dist
          cp build/Release/polaris dist/
          cp -P build/Release/_deps/qxmpp-build/src/libQXmppQt6.so* dist/
          cp -P build/Release/bin/libqt6keychain.so* dist/
          patchelf --set-rpath '$ORIGIN' dist/polaris
          tar -czf polaris-linux-x86_64.tar.gz -C dist .

      # System Qt6 itself (Qt6Core/Gui/Qml/Quick/Network/Xml and the
      # QtQuick.Controls/.Material/.Layouts QML plugins) is deliberately
      # NOT bundled - this project always links against the system
      # install (see CMakeLists.txt's qt_standard_project_setup), so
      # running this binary still requires Qt 6.5+ installed on the
      # target machine. Documented in the release notes below rather than
      # solved here - full self-contained deployment (linuxdeployqt-style)
      # is a bigger undertaking than this step.
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            polaris-linux-x86_64.tar.gz \
            --title "${{ github.ref_name }}" \
            --notes "$(cat <<'EOF'
          A release of Polaris (pyobs-polaris), a clean-room C++/QML client for pyobs 2.0. Every phase up to this tag was verified live against a real ejabberd server and real pyobs modules - see DEVELOPMENT.md for the full phase-by-phase history.

          **What's in this release:**
          - XMPP connect/disconnect with live status
          - disco#info-driven module/interface/schema discovery
          - Presence-driven live module list
          - Generic PubSub state subscription + rendering (any interface, zero interface-specific code)
          - Generic RPC command execution
          - Live domain event log via PEP
          - First hand-designed widget: RoofWidget for IRoof modules

          **Runtime requirements (Linux x86_64):**
          - Qt 6.5+ installed on the system (built and tested against Qt 6.10.2 from Ubuntu 26.04's apt packages): `libQt6Core`, `libQt6Gui`, `libQt6Qml`, `libQt6Quick`, `libQt6Network`, `libQt6Xml`, plus the QtQuick.Controls / QtQuick.Controls.Material / QtQuick.Layouts QML modules
          - The bundled `libQXmppQt6.so.5` (vendored, QXmpp v1.10.2) and `libqt6keychain.so.1` (vendored, QtKeychain v0.17.0) must stay alongside the `polaris` binary - already laid out correctly in this tarball
          - `libsecret-1-0` (usually already present on a KDE/GNOME desktop) plus a running Secret Service provider (e.g. gnome-keyring, KWallet) if you want "remember this login" to actually persist a password - the app works fine without one, that checkbox just won't have anywhere secure to store the password

          **Usage:**
          ```
          tar -xzf polaris-linux-x86_64.tar.gz
          ./polaris
          ```

          Built directly by this repository's CI (ubuntu-26.04, Qt 6.10.2) from this tag.
          EOF
          )"
