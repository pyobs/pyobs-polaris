name: build

# push is scoped to develop + tags, not main: main only ever advances via
# fast-forward from an already-CI-tested develop commit in this project's
# workflow, so a plain `push:` (every branch) built the identical tree
# three times on every release - develop's own push, main's fast-forward,
# then the release tag. If main ever received a commit that didn't go
# through develop first, it would get no CI coverage until a tag was cut
# off it - accepted tradeoff given the current always-via-develop practice.
on:
  push:
    branches: [develop]
    tags: ['v*']
  pull_request:

jobs:
  build:
    # Windows/macOS build+test AND now produce their own release artifacts
    # too (windeployqt/macdeployqt, self-contained - see the packaging
    # steps below) - originally added for coverage only (DEVELOPMENT.md's
    # "Windows/macOS are untested, not unsupported" note on QtKeychain),
    # extended once that proved out.
    #
    # Getting both working needed several rounds of genuinely
    # platform-specific fixes verified against real runs, not guessed:
    # wrong Qt `arch` for aqtinstall, macOS's Xcode SDK dropping the AGL
    # framework, three separate libnova/MSVC CMake quirks, Windows DLL
    # discoverability causing tests to hang rather than fail, and
    # windeployqt hard-coding the Qt install prefix for dependency
    # resolution. See this file's own git history for the full trail.
    strategy:
      fail-fast: false
      matrix:
        # macos-14, not macos-latest: GitHub is mid-migration of that
        # floating label to macOS 26 (started ~2026-06-15), so consecutive
        # "macos-latest" runs can land on genuinely different underlying
        # Xcode/toolchain versions - already caused one real build break
        # (Xcode 26's SDK dropped the AGL framework Qt 6.8.1 still linked)
        # and, more subtly, silently invalidates ccache's cross-run hit
        # rate (ccache hashes in the compiler's own version/timestamp, so
        # a different Xcode = a near-total cache miss even though no
        # source changed - observed directly: 99.30% hits one run, 10.53%
        # the very next, nothing but this workflow file's own comments
        # differing between them). Pinning trades "latest" freshness for
        # actually-reproducible builds and a cache that reliably pays off.
        os: [ubuntu-26.04, windows-latest, macos-14]
    # contents: write is only actually exercised on a tag push (the release
    # step below is gated on that) - harmless for ordinary branch/PR runs,
    # which never reach that step.
    permissions:
      contents: write
    # ubuntu-26.04 matches the dev machine's OS exactly, rather than
    # GitHub's "ubuntu-latest" label, which lags real Ubuntu releases by
    # years (currently Ubuntu 24.04 / Qt 6.4.2 - over two years behind what
    # this project requires: qt_standard_project_setup(REQUIRES 6.5) in
    # CMakeLists.txt, and what's actually used in dev, 6.10.2). That gap
    # already caused two build breaks (QDomDocument::ParseOption needs 6.8,
    # QQmlApplicationEngine::loadFromModule needs 6.5). If ubuntu-26.04 ever
    # stops being offered as a hosted runner, fall back to pinning a modern
    # Qt6 explicitly (e.g. via jurplel/install-qt-action, already used
    # below for Windows/macOS) rather than silently drifting back onto
    # ubuntu-latest's much older apt Qt. windows-latest is left floating
    # (no equivalent apt-version-lag risk on that image, and no observed
    # cross-run non-determinism the way macos-latest had) - macos-14 is
    # pinned instead, see the matrix comment above.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Ninja+MSVC needs the MSVC dev environment (cl.exe, INCLUDE/LIB env
      # vars) active in the shell *before* CMake configures - unlike the
      # Visual Studio generator, Ninja doesn't locate MSVC itself. Must run
      # before every later step on Windows, hence right after checkout.
      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt6 dev packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-base-dev-tools \
            qt6-declarative-dev qt6-declarative-dev-tools

      # libsecret-1-dev + pkg-config: required by QtKeychain (vendored via
      # FetchContent below) to build its Linux Secret Service backend -
      # see its own CMakeLists.txt's pkg_check_modules(LIBSECRET REQUIRED
      # libsecret-1). QtKeychain's Windows (Credential Manager) and macOS
      # (Keychain) backends link platform frameworks its own CMakeLists.txt
      # already handles - no equivalent extra step needed on those OSes.
      - name: Install QtKeychain build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libsecret-1-dev pkg-config

      # Neither Windows nor macOS has an OS-provided Qt6 the way Ubuntu's
      # apt does - install-qt-action fetches a prebuilt desktop Qt from
      # Qt's own aqt archives instead. Pinned to 6.10.2 to exactly match
      # the Linux leg's apt-provided version (confirmed available for both
      # OSes via a real `aqt list-qt {windows,mac} desktop --arch 6.10.2`
      # query) - not just for consistency: an earlier attempt at 6.8.1
      # failed macOS's link step with "framework 'AGL' not found"
      # (QTBUG-137687 - Apple removed the AGL framework from the SDK
      # macos-latest's Xcode ships, and only later 6.9.x/6.10.x Qt
      # releases stopped requiring it). `arch` is required for Windows
      # specifically (Linux/macOS desktop default to gcc_64/clang_64
      # automatically); win64_msvc2019_64 (this step's very first guess)
      # doesn't exist as of 6.8+, which dropped MSVC2019 prebuilts -
      # win64_msvc2022_64 is what's actually published.
      - name: Install Qt6 (Windows/macOS)
        if: runner.os != 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          arch: ${{ runner.os == 'Windows' && 'win64_msvc2022_64' || '' }}

      # Forces Ninja (a single-config generator) instead of each OS's
      # default - critically, Visual Studio's generator on Windows, which
      # would make Conan's CMakeToolchain emit a differently-named preset
      # ("conan-default" instead of "conan-release"), breaking the
      # `--preset conan-release` commands shared by every OS below. Not
      # preinstalled on any of these runner images (GitHub dropped the
      # incidental Windows inclusion a while back, and it was never on
      # Ubuntu/macOS images) - installed via pip since that's the one
      # install method that doesn't need a third OS-specific step.
      - name: Install Ninja (Windows/macOS)
        if: runner.os != 'Linux'
        run: pip install ninja

      - name: Install Conan
        run: pipx install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      # Split into restore (here) + save (near the end, if: always()) -
      # the combined actions/cache action only saves in its post step if
      # every step in the job succeeded, so every Windows/macOS run that
      # failed partway through Build or Test (several did, while getting
      # these two platforms working) wasted its *entire* qxmpp/QtKeychain/
      # libnova/cfitsio rebuild instead of banking it for next time.
      # actions/cache did have a save-always input for exactly this, but
      # it's deprecated ("does not work as intended") - restore+save is
      # the currently-documented replacement.
      #
      # Conan's package cache: mostly future-proofing until a real Conan
      # dependency (e.g. cfitsio) shows up - conanfile.txt has no requires
      # yet, see conanfile.txt for why (qxmpp is deliberately not one).
      - name: Restore Conan packages cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.txt') }}

      # qxmpp and QtKeychain are both vendored via CMake FetchContent (see
      # cmake/Dependencies.cmake), which means compiling ~100 of qxmpp's
      # source files (plus QtKeychain's) from scratch on every CI run
      # otherwise - by far the most expensive part of this build. Keyed on
      # cmake/Dependencies.cmake specifically (which pins both GIT_TAGs),
      # not the whole CMakeLists.txt - that used to bust this cache on
      # every unrelated CMakeLists.txt edit (a new widget/source file added
      # to qt_add_executable()/qt_add_qml_module()'s lists, which is nearly
      # every commit), silently costing a full rebuild-from-scratch each
      # time. A real GIT_TAG bump still invalidates it correctly since that
      # only lives in cmake/Dependencies.cmake now.
      - name: Restore FetchContent-vendored dependency builds cache
        uses: actions/cache/restore@v4
        with:
          path: build/Release/_deps
          key: fetchcontent-deps-${{ runner.os }}-${{ hashFiles('cmake/Dependencies.cmake') }}

      - name: Conan install
        run: >
          conan install . --build=missing
          ${{ runner.os != 'Linux' && '-c tools.cmake.cmaketoolchain:generator=Ninja' || '' }}

      # The two caches above only cover vendored dependencies
      # (build/Release/_deps) - this project's own ~40 source files and 18
      # test binaries recompile from scratch on every single run regardless,
      # since there's no cache for incremental first-party builds across
      # separate CI jobs. ccache closes that gap: unlike the directory-
      # snapshot caching above (all-or-nothing, invalidated by a
      # conanfile.txt/Dependencies.cmake hash), it caches per translation
      # unit (hashed preprocessed source + flags), so touching one file
      # doesn't invalidate the rest - a run that only changes a handful of
      # .cpp files should reuse cached objects for everything else. Using
      # the hendrikmuhs/ccache-action rather than hand-rolling per-OS
      # install/cache-directory logic - this project's own history of
      # getting Windows/macOS specifics wrong without being able to test
      # them locally (Qt arch strings, DLL discovery, libnova's MSVC
      # quirks) argues for leaning on a well-established, actively
      # maintained action instead for exactly this class of "can't verify
      # it myself" cross-platform tooling.
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ccache-${{ runner.os }}
          max-size: 500M

      - name: Configure
        run: >
          cmake --preset conan-release
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset conan-release

      # tst_savedaccountsmodel exercises the real OS keychain rather than
      # mocking QtKeychain (see DEVELOPMENT.md) - a bare runner has no
      # D-Bus session/keyring daemon at all, so its two keychain-storing
      # tests skip themselves under CI specifically (see
      # tst_savedaccountsmodel.cpp's realKeychainBackendAvailable() - `CI`
      # is the env var GitHub Actions sets for this). Getting a real
      # Secret Service running headlessly turned out to be genuinely
      # fragile (gnome-keyring's interactive collection-creation prompt
      # failed a different way in each of several attempts - see this
      # file's own git history) - on the user's direct call, this is
      # dev-machine-only coverage for those two tests rather than chasing
      # a mock D-Bus Secret Service just for CI.
      # --timeout: a hung test (e.g. Windows silently blocking forever on
      # a missing-DLL Windows Error Reporting dialog, with no interactive
      # session to dismiss it - see CMakeLists.txt's CMAKE_RUNTIME_OUTPUT_DIRECTORY
      # comment) would otherwise burn the entire job timeout instead of
      # failing fast with a clear signal.
      - name: Test
        run: ctest --output-on-failure --timeout 120
        working-directory: build/Release

      # Save half of the restore/save split above - if: always() so a
      # failure anywhere before this point (Build, Test, ...) still banks
      # whatever got built for next time, instead of the combined action's
      # default of only saving when the whole job succeeds. A no-op if the
      # exact key was already saved by an earlier successful run (cache
      # keys are immutable; actions/cache/save just skips with a notice).
      - name: Save Conan packages cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.txt') }}

      - name: Save FetchContent-vendored dependency builds cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: build/Release/_deps
          key: fetchcontent-deps-${{ runner.os }}-${{ hashFiles('cmake/Dependencies.cmake') }}

      # Only on a version tag push. The plain build/Release/polaris
      # binary is not redistributable as-is: it links libQXmppQt6.so.5,
      # libqt6keychain.so.1, and liblibnova.so via an absolute RUNPATH into
      # this job's own ephemeral build directory (CMake's normal, correct
      # behavior for an uninstalled build-tree binary) - copying just the
      # executable elsewhere would fail with "cannot open shared object
      # file" the moment it's run. patchelf rewrites the RUNPATH to
      # $ORIGIN so a copy of all three .so's placed alongside the binary
      # (as this tarball does) is found instead, wherever it's eventually
      # extracted. liblibnova.so was missing from this list until now -
      # a real gap (every past release tarball would have failed to start
      # once actually extracted, not just an oversight caught in review),
      # not just a Windows/macOS-shaped addition.
      #
      # System Qt6 itself (Qt6Core/Gui/Qml/Quick/Network/Xml and the
      # QtQuick.Controls/.Material/.Layouts QML plugins) is deliberately
      # NOT bundled on Linux - this project always links against the
      # system install (see CMakeLists.txt's qt_standard_project_setup),
      # so running this binary still requires Qt 6.5+ installed on the
      # target machine (documented in the release notes below). Windows/
      # macOS below take the opposite approach (windeployqt/macdeployqt
      # bundle Qt itself into the artifact) - Linux is the one platform
      # where "install Qt6 from your package manager" is a reasonable ask
      # of an end user; Windows/macOS users have no equivalent expectation.
      - name: Package release artifact (Linux)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Linux'
        run: |
          sudo apt-get install -y patchelf
          mkdir -p dist
          cp build/Release/polaris dist/
          cp -P build/Release/_deps/qxmpp-build/src/libQXmppQt6.so* dist/
          cp -P build/Release/bin/libqt6keychain.so* dist/
          cp -P build/Release/_deps/libnova-build/liblibnova.so* dist/
          patchelf --set-rpath '$ORIGIN' dist/polaris
          tar -czf polaris-linux-x86_64.tar.gz -C dist .

      # windeployqt scans polaris.exe's actual Qt module dependencies and
      # copies the matching DLLs/plugins alongside it; --qmldir additionally
      # scans qml/ for QML imports (QtQuick.Controls etc.) it wouldn't
      # otherwise detect from the binary alone. CMAKE_RUNTIME_OUTPUT_DIRECTORY
      # (CMakeLists.txt, WIN32-guarded) already funnels polaris.exe and the
      # vendored qt6keychain.dll/QXmppQt6.dll/libnova.dll into one directory
      # - windeployqt only needs to add Qt's own pieces to that same folder,
      # it doesn't need to (and can't) deploy those vendored DLLs itself.
      #
      # windeployqt hard-codes the assumption that every one of an
      # executable's dependencies lives under the Qt install prefix -
      # walking polaris.exe's import table, it tries (and fails) to find
      # qt6keychain.dll specifically under $QT_ROOT_DIR\bin, since the
      # name looks Qt-associated even though it's our own vendored copy,
      # and aborts immediately rather than continuing to deploy Qt's own
      # pieces (confirmed - --ignore-library-errors does NOT make this
      # non-fatal despite its name; a first attempt at this step still hit
      # the exact same abort with that flag set). The actual fix
      # (confirmed as the standard workaround for this class of
      # windeployqt limitation, e.g. QTBUG-39177): copy the vendored DLLs
      # into $QT_ROOT_DIR\bin first, satisfying windeployqt's own lookup
      # path. Self-contained - this doesn't touch the actual release
      # artifact (Compress-Archive still only packages build\Release\bin\,
      # where CMAKE_RUNTIME_OUTPUT_DIRECTORY already placed the real
      # copies polaris.exe actually loads at runtime), it only exists to
      # satisfy windeployqt's dependency walk.
      # Unlike Linux, the whole point here is a self-contained artifact - a
      # typical Windows user has no "install Qt6" equivalent to apt.
      - name: Package release artifact (Windows)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item build\Release\bin\qt6keychain.dll,build\Release\bin\QXmppQt6.dll,build\Release\bin\libnova.dll -Destination "$env:QT_ROOT_DIR\bin\"
          windeployqt --qmldir qml build\Release\bin\polaris.exe
          Compress-Archive -Path build\Release\bin\* -DestinationPath polaris-windows-x86_64.zip

      # macdeployqt only knows how to deploy into a real .app bundle
      # (CMakeLists.txt's APPLE-guarded MACOSX_BUNDLE TRUE makes
      # build/Release/polaris.app exist in the first place - qt_add_executable()
      # doesn't opt into that on its own). Lands directly at
      # build/Release/, NOT build/Release/bin/ - CMAKE_RUNTIME_OUTPUT_DIRECTORY
      # (CMakeLists.txt) only redirects output on WIN32; a first attempt at
      # this step assumed the same bin/ path as Windows and failed with
      # "Could not find app bundle". macdeployqt walks polaris's actual
      # dependency graph (via the RPATHs CMake's build tree already sets,
      # same mechanism the Linux patchelf step works around) to find and
      # embed not just Qt's own frameworks but also the vendored
      # QXmppQt6/qt6keychain/libnova dylibs - no separate copy step needed
      # the way Linux/Windows each require. Same self-contained-artifact
      # reasoning as Windows above.
      #
      # Unsigned/not notarized: first launch needs a right-click-Open
      # (documented in the release notes below) rather than a plain
      # double-click, which Gatekeeper would otherwise block - a real
      # signing/notarization setup (Apple Developer account, credentials
      # in CI) is a separate undertaking from just producing an artifact.
      - name: Package release artifact (macOS)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'macOS'
        run: |
          macdeployqt build/Release/polaris.app -qmldir=qml
          ditto -c -k --sequesterRsrc build/Release/polaris.app polaris-macos-arm64.zip

      # Matrix jobs run in parallel, so exactly one of these three legs'
      # `gh release create` calls will actually create the release (racing
      # is fine - releases/tags are created atomically server-side, so
      # whichever job gets there first wins) and the other two will fail
      # with "release already exists" - falling back to `gh release
      # upload --clobber` for those attaches this OS's own asset to the
      # release the winning job created, --clobber so re-running a single
      # failed leg (as happened getting Windows/macOS working) doesn't
      # error on an asset that's already there from a previous attempt.
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "${{ runner.os }}" in
            Linux) ASSET=polaris-linux-x86_64.tar.gz ;;
            Windows) ASSET=polaris-windows-x86_64.zip ;;
            macOS) ASSET=polaris-macos-arm64.zip ;;
          esac
          if gh release create "${{ github.ref_name }}" "$ASSET" \
            --title "${{ github.ref_name }}" \
            --notes "$(cat <<'EOF'
          A release of Polaris (pyobs-polaris), a clean-room C++/QML client for pyobs 2.0. Every phase up to this tag was verified live against a real ejabberd server and real pyobs modules - see DEVELOPMENT.md for the full phase-by-phase history.

          **What's in this release:**
          - XMPP connect/disconnect with live status
          - disco#info-driven module/interface/schema discovery
          - Presence-driven live module list
          - Generic PubSub state subscription + rendering (any interface, zero interface-specific code)
          - Generic RPC command execution
          - Live domain event log via PEP
          - First hand-designed widget: RoofWidget for IRoof modules

          **Downloads:**
          - `polaris-linux-x86_64.tar.gz` — Linux x86_64
          - `polaris-windows-x86_64.zip` — Windows x86_64
          - `polaris-macos-arm64.zip` — macOS (Apple Silicon)

          **Runtime requirements (Linux x86_64):**
          - Qt 6.5+ installed on the system (built and tested against Qt 6.10.2 from Ubuntu 26.04's apt packages): `libQt6Core`, `libQt6Gui`, `libQt6Qml`, `libQt6Quick`, `libQt6Network`, `libQt6Xml`, plus the QtQuick.Controls / QtQuick.Controls.Material / QtQuick.Layouts QML modules
          - The bundled `libQXmppQt6.so.5` (vendored, QXmpp v1.10.2), `libqt6keychain.so.1` (vendored, QtKeychain v0.17.0), and `liblibnova.so` (vendored, libnova v0.16) must stay alongside the `polaris` binary - already laid out correctly in this tarball
          - `libsecret-1-0` (usually already present on a KDE/GNOME desktop) plus a running Secret Service provider (e.g. gnome-keyring, KWallet) if you want "remember this login" to actually persist a password - the app works fine without one, that checkbox just won't have anywhere secure to store the password

          **Runtime requirements (Windows/macOS):** none - both artifacts are self-contained (Qt itself and every vendored dependency are bundled in), no separate Qt install needed.

          **macOS Gatekeeper note:** the app isn't signed/notarized, so a plain double-click on first launch will be blocked ("cannot be opened because the developer cannot be verified"). Right-click `Polaris.app` → Open once instead (or `xattr -cr Polaris.app` after unzipping) to bypass this - only needed the first time.

          **Usage:**
          ```
          # Linux
          tar -xzf polaris-linux-x86_64.tar.gz
          ./polaris

          # Windows
          Expand-Archive polaris-windows-x86_64.zip
          .\polaris.exe

          # macOS
          unzip polaris-macos-arm64.zip
          open Polaris.app   # or right-click -> Open on first launch
          ```

          Built directly by this repository's CI from this tag (ubuntu-26.04/Qt 6.10.2, windows-latest/Qt 6.10.2, macos-14/Qt 6.10.2).
          EOF
          )"; then
            echo "Created release and uploaded $ASSET"
          else
            echo "Release already exists - uploading $ASSET to it instead"
            gh release upload "${{ github.ref_name }}" "$ASSET" --clobber
          fi
